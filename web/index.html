<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover : iOS 노치/홈바 영역까지 확장 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />

    <title>K-pop English</title>

    <!-- PWA: 홈 화면 추가 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="K-pop" />
    <meta name="theme-color" content="#FC3C44" />
    <meta name="description" content="K-pop 가사로 배우는 영어 학습 앱" />

    <!-- 아이콘 -->
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <link rel="icon" href="/favicon.ico" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <style id="expo-reset">
      html, body { height: 100%; margin: 0; padding: 0; background: #0a0a0f; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
      /* iOS safe area 패딩 (notch / home bar) */
      #root { padding-top: env(safe-area-inset-top); }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // 앱 JS 번들 로드 전 전역 에러 캐처 — 개발자 도구 없어도 오류 확인 가능
      function showError(msg) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#000;color:#f55;padding:24px;font-size:13px;font-family:monospace;z-index:99999;overflow:auto;white-space:pre-wrap;word-break:break-all';
        d.textContent = msg;
        document.body.appendChild(d);
      }
      window.onerror = function(msg, src, line, col, err) {
        showError('JS ERROR:\n' + msg + '\n' + src + ':' + line + ':' + col + '\n' + (err && err.stack ? err.stack : ''));
      };
      window.addEventListener('unhandledrejection', function(e) {
        showError('PROMISE ERROR:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)));
      });
    </script>
  </body>
</html>
